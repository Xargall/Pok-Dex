<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PokéDex</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="./styles/fonts.css" />
    <link rel="stylesheet" href="./styles/standart.css" />
    <link rel="stylesheet" href="./styles/modal.css">
    <link
      rel="shortcut icon"
      href="./assets/icons/favicon.svg"
      type="image/x-icon" />
    <script src="script.js"></script>
    <script src="./script/template.js"></script>
  </head>
  <body onload="init()">
    <header>
      <section>
        <img src="./assets/imgs/pokédex.png" alt="" /><input
          type="text"
          oninput="searchPokemon()" />
      </section>
    </header>
    <main id="content" class="main_content"></main>
    <div class="center" id="loader">
      <div class="loader">
        <div class="head"></div>

        <div class="flames">
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
        </div>

        <div class="eye"></div>
      </div>
    </div>
    <div class="load_more">
      <button id="loadMoreBtn" onclick="bulkLoadNextPokemon()">Show More!</button>
    </div>
    <footer></footer>
    <dialog id="details" onclick="closeDetails()"></dialog>
  </body>
</html>
