<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PokéDex</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="./styles/fonts.css" />
    <link rel="stylesheet" href="./styles/standart.css" />
    <link rel="stylesheet" href="./styles/modal.css" />
    <link rel="stylesheet" href="./styles/mediaqueries.css" />
    <link
      rel="shortcut icon"
      href="./assets/icons/Type=Poké Ball.png"
      type="image/x-icon" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./script/utils.js"></script>
    <script src="./script/api.js"></script>
    <script src="./script/render.js"></script>
    <script src="./script/search.js"></script>
    <script src="./script/holo.js"></script>
    <script src="./script/template.js"></script>
    <script src="script.js"></script>
  </head>
  <body onload="init()">
    <header class="pokemon_box">
      <section class="headline">
        <h1># PokeDex</h1>
        <div class="search_wrapper">
          <div class="container">
            <input
              type="text"
              oninput="searchPokemon()"
              placeholder="Search by Name or Number..."
              id="searchInput" />
            <button onclick="resetSearch()">✕</button>
          </div>
          <small id="search_hint">Please enter at least 3 characters...</small>
        </div>
      </section>
    </header>

    <div
      id="api_error"
      class="api_error d_none"
      role="alert"
      aria-live="assertive">
      <div class="api_error_inner">
        <span class="api_error_icon">⚠️</span>
        <div class="api_error_text">
          <strong>PokéAPI nicht erreichbar</strong>
          <p id="api_error_msg">
            Die Daten werden aus dem Cache geladen – manche Pokémon könnten
            fehlen.
          </p>
        </div>
        <button onclick="retryInit()" class="api_retry_btn">
          ↺ Erneut versuchen
        </button>
      </div>
    </div>

    <main id="content" class="main_content"></main>
    <div
      class="center d_none"
      id="loader"
      role="status"
      aria-label="loading Pokémon">
      <div class="wrapper">
        <div class="pokeball_load"></div>
      </div>
      <div class="eye"></div>
    </div>

    <div
      id="sr_live"
      aria-live="polite"
      aria-atomic="true"
      class="sr_only"></div>
    <div class="load_more">
      <button id="loadMoreBtn" onclick="bulkLoadNextPokemon()">
        Show More!
      </button>
    </div>
    <footer>
      <div class="mart"><img src="./assets/imgs/Frame.png" alt="" /></div>

      <div class="footer_copy">
        <p>
          © 2026
          <a
            href="https://github.com/Xargall"
            target="_blank"
            rel="noopener noreferrer"
            >Mathias Mayer</a
          >
        </p>
        <p class="footer_copy_sub">
          Data & Images:
          <a href="https://pokeapi.co" target="_blank" rel="noopener noreferrer"
            >PokéAPI</a
          >
          ·
          <a
            href="https://github.com/PokeAPI/sprites"
            target="_blank"
            rel="noopener noreferrer"
            >PokeAPI/sprites</a
          >
        </p>
      </div>
      <div class="battle">
        <img src="./assets/imgs/Type=Gym 2.png" alt="" class="img_01" />
        <div class="build_up">
          <img
            src="./assets/imgs/Character=Gary, Steps=1, Orientation=-_ Right.png"
            alt="" />
          <img
            src="./assets/imgs/Pokemon=0003 - Venusaur, Steps=4, Orientation=-_ Right.png"
            alt="" />
          <img
            src="./assets/imgs/Pokemon=0006 - Charizard, Steps=1, Orientation=_- Left.png"
            alt="" />
          <img
            src="./assets/imgs/Character=Red, Steps=1, Orientation=_- Left.png"
            alt="" />
        </div>
      </div>
    </footer>
    <dialog id="details" onclick="closeDetails()"></dialog>
  </body>
</html>
